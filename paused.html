<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEFA8 — Paused</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D1117;--surface:#161B22;--border:#30363D;--text:#E6EDF3;--muted:#7D8590;--accent:#F0883E;}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Instrument Sans',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background-image:
    radial-gradient(ellipse at 20% 20%,#F0883E08 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,#3FB95006 0%,transparent 50%);
}
.card{text-align:center;max-width:460px;}
.logo{font-family:'Syne Mono',monospace;font-size:16px;letter-spacing:4px;color:var(--accent);margin-bottom:32px;}
.eyebrow{font-family:'Syne Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:14px;}
h1{font-family:'Syne',sans-serif;font-size:clamp(36px,8vw,56px);font-weight:800;line-height:1.05;margin-bottom:18px;
  background:linear-gradient(135deg,var(--text) 0%,#7D8590 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
p{font-size:15px;color:var(--muted);font-weight:300;line-height:1.7;}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">W8</div>
    <div class="eyebrow">WEFA8 League Tools</div>
    <h1>Paused</h1>
    <p>The league tools are temporarily offline. Check back soon.</p>
  </div>
</body>
</html>
